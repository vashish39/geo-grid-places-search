<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Austin Leads — Business Data Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #ffffff12;
    --border2: #ffffff20;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #3ecf8e;
    --yellow: #f6c90e;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a72;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP HEADER ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 18px;
    color: var(--text);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot { 
    width: 8px; height: 8px; 
    background: var(--accent); 
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
  }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }

  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat-pill strong { color: var(--text); }

  /* ── MAIN LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 60px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 10;
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--mono);
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .biz-list {
    flex: 1;
    overflow-y: auto;
  }

  .biz-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .biz-item:hover { background: var(--surface2); }
  .biz-item.selected { background: rgba(108, 99, 255, 0.12); border-left: 3px solid var(--accent); }

  .biz-thumb {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
  }

  .biz-thumb-placeholder {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .biz-meta { flex: 1; min-width: 0; }

  .biz-name {
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .biz-sub {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .biz-rating {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--yellow);
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ── DETAIL PANEL ── */
  .detail {
    overflow-y: auto;
    background: var(--bg);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text3);
  }

  .empty-icon { font-size: 48px; opacity: 0.3; }

  .detail-inner { padding: 32px; max-width: 900px; }

  /* Hero section */
  .detail-hero {
    border-radius: 16px;
    overflow: hidden;
    height: 280px;
    position: relative;
    margin-bottom: 28px;
    background: var(--surface);
  }

  .hero-photos {
    display: grid;
    height: 100%;
    gap: 3px;
  }

  .hero-photos.one { grid-template-columns: 1fr; }
  .hero-photos.two { grid-template-columns: 2fr 1fr; }
  .hero-photos.three { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
  .hero-photos.many { grid-template-columns: 2fr 1fr 1fr; grid-template-rows: 1fr 1fr; }

  .hero-photo {
    object-fit: cover;
    width: 100%;
    height: 100%;
  }

  .hero-photos.three .hero-photo:first-child { grid-row: span 2; }
  .hero-photos.many .hero-photo:first-child { grid-row: span 2; }

  /* Name + badges */
  .detail-name {
    font-family: var(--display);
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -1px;
    margin-bottom: 10px;
    line-height: 1.1;
  }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }

  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 500;
    border: 1px solid;
  }

  .badge-type { background: rgba(108,99,255,0.1); border-color: rgba(108,99,255,0.3); color: var(--accent); }
  .badge-rating { background: rgba(246,201,14,0.1); border-color: rgba(246,201,14,0.3); color: var(--yellow); }
  .badge-reviews { background: rgba(62,207,142,0.1); border-color: rgba(62,207,142,0.3); color: var(--green); }
  .badge-price { background: rgba(255,255,255,0.05); border-color: var(--border2); color: var(--text2); }

  /* Info grid */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .info-card-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .info-card-value {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    word-break: break-word;
  }

  .info-card-value a {
    color: var(--accent);
    text-decoration: none;
  }

  .info-card-value a:hover { text-decoration: underline; }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 10px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--mono);
    margin-left: 8px;
    transition: all 0.15s;
    vertical-align: middle;
  }

  .copy-btn:hover { color: var(--text); border-color: var(--border2); }
  .copy-btn.copied { color: var(--green); border-color: var(--green); }

  /* Section headers */
  .section-title {
    font-family: var(--display);
    font-size: 14px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Photos grid */
  .photos-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }

  .photo-item {
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: var(--surface);
  }

  .photo-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }

  .photo-item:hover img { transform: scale(1.05); }

  .photo-copy-url {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.8);
    color: white;
    font-size: 9px;
    font-family: var(--mono);
    padding: 4px 6px;
    opacity: 0;
    transition: opacity 0.2s;
    word-break: break-all;
    line-height: 1.3;
  }

  .photo-item:hover .photo-copy-url { opacity: 1; }

  /* Reviews */
  .reviews-list { display: flex; flex-direction: column; gap: 12px; }

  .review-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .review-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .review-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--surface2);
  }

  .review-author { font-weight: 600; font-size: 13px; }
  .review-time { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .review-stars { color: var(--yellow); font-size: 12px; margin-left: auto; }

  .review-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    font-style: italic;
  }

  /* Hours */
  .hours-list { 
    display: flex; 
    flex-direction: column; 
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .hours-row {
    display: flex;
    font-size: 13px;
    font-family: var(--mono);
    gap: 12px;
  }

  .hours-day { color: var(--text2); width: 110px; flex-shrink: 0; }
  .hours-time { color: var(--text); }
  .hours-today { color: var(--green); font-weight: 600; }

  /* Actions bar */
  .actions-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    border: none;
    transition: all 0.2s;
    font-family: var(--sans);
  }

  .action-primary {
    background: var(--accent);
    color: white;
  }

  .action-primary:hover { background: #7c74ff; transform: translateY(-1px); }

  .action-secondary {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
  }

  .action-secondary:hover { border-color: var(--border2); background: var(--surface); }

  /* Amenities */
  .amenities-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .amenity-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--mono);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
  }

  .amenity-pill.yes { 
    background: rgba(62,207,142,0.08); 
    border-color: rgba(62,207,142,0.25); 
    color: var(--green); 
  }

  /* Social links */
  .social-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .social-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
    color: var(--text2);
    text-decoration: none;
    transition: all 0.2s;
    font-family: var(--mono);
    overflow: hidden;
  }

  .social-link:hover { border-color: var(--border2); color: var(--text); }

  .social-icon { font-size: 16px; flex-shrink: 0; }

  /* Summary box */
  .summary-box {
    background: rgba(108,99,255,0.06);
    border: 1px solid rgba(108,99,255,0.2);
    border-radius: 12px;
    padding: 16px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
    font-style: italic;
    margin-bottom: 8px;
  }

  /* Loading overlay */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    flex-direction: column;
    gap: 16px;
    color: var(--text3);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Upload area */
  .upload-area {
    border: 2px dashed var(--border2);
    border-radius: 16px;
    padding: 48px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    margin: 24px;
  }

  .upload-area:hover, .upload-area.drag-over {
    border-color: var(--accent);
    background: rgba(108,99,255,0.05);
  }

  .upload-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
  .upload-title { font-family: var(--display); font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .upload-sub { font-size: 13px; color: var(--text3); line-height: 1.6; }

  .upload-or {
    margin: 16px 0;
    font-size: 12px;
    color: var(--text3);
  }

  .upload-file-btn {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--sans);
    border: none;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .no-results {
    padding: 32px 20px;
    text-align: center;
    color: var(--text3);
    font-size: 13px;
  }

  /* JSON export area */
  .json-section { margin-top: 24px; }
  .json-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .place-id-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    Austin Leads
  </div>
  <span style="font-size:12px;color:var(--text3);font-family:var(--mono)">Business Data Dashboard</span>
  <div class="topbar-right">
    <div class="stat-pill" id="totalStat"><strong id="countDisplay">0</strong>&nbsp;businesses</div>
    <div class="stat-pill"><strong id="photoStat">0</strong>&nbsp;with photos</div>
    <button class="filter-btn" onclick="exportAll()" style="padding:6px 14px;">⬇ Export All JSON</button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <input class="search-input" id="searchInput" placeholder="Search businesses..." oninput="filterList()">
      <div class="filter-row" id="typeFilters"></div>
    </div>
    <div class="biz-list" id="bizList">
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()"
           ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
        <div class="upload-icon">📂</div>
        <div class="upload-title">Load enriched_places.json</div>
        <div class="upload-sub">
          Run <code style="color:var(--accent);font-family:var(--mono)">node gather.js --api-key YOUR_KEY</code><br>
          then drag & drop the output file here
        </div>
        <div class="upload-or">— or —</div>
        <label class="upload-file-btn">Browse File</label>
        <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileInput(event)">
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail" id="detailPanel">
    <div class="empty-state">
      <div class="empty-icon">🗺</div>
      <div style="font-family:var(--display);font-size:18px;font-weight:700;">Select a business</div>
      <div style="font-size:13px;color:var(--text3);">Load your data file, then click any listing</div>
    </div>
  </div>
</div>

<script>
let allBusinesses = [];
let filteredBusinesses = [];
let activeType = 'all';

// ── File Loading ─────────────────────────────────────────────────────────────

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.add('drag-over');
}

function handleDragLeave(e) {
  document.getElementById('uploadArea').classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
}

function handleFileInput(e) {
  const file = e.target.files[0];
  if (file) loadFile(file);
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      const businesses = data.businesses || data;
      allBusinesses = Array.isArray(businesses) ? businesses : [businesses];
      initDashboard();
    } catch (err) {
      alert('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ── Dashboard Init ────────────────────────────────────────────────────────────

function initDashboard() {
  filteredBusinesses = [...allBusinesses];

  // Update stats
  document.getElementById('countDisplay').textContent = allBusinesses.length;
  document.getElementById('photoStat').textContent = allBusinesses.filter(b => b.photos?.length > 0).length;

  // Build type filters
  const types = [...new Set(allBusinesses.map(b => cleanType(b.primaryType || b.types?.[0] || 'other')))];
  const filterRow = document.getElementById('typeFilters');
  filterRow.innerHTML = `<button class="filter-btn active" onclick="setTypeFilter('all', this)">All</button>`;
  types.slice(0, 8).forEach(t => {
    filterRow.innerHTML += `<button class="filter-btn" onclick="setTypeFilter('${t}', this)">${t}</button>`;
  });

  renderList();
}

function cleanType(type) {
  return (type || 'other').replace(/_/g, ' ').replace('establishment', '').trim().toLowerCase();
}

function setTypeFilter(type, btn) {
  activeType = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterList();
}

function filterList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredBusinesses = allBusinesses.filter(b => {
    const matchesSearch = !q || b.name.toLowerCase().includes(q) || 
      (b.address || '').toLowerCase().includes(q) ||
      (b.primaryType || '').toLowerCase().includes(q);
    const matchesType = activeType === 'all' || cleanType(b.primaryType || b.types?.[0]) === activeType;
    return matchesSearch && matchesType;
  });
  renderList();
}

function renderList() {
  const list = document.getElementById('bizList');
  if (filteredBusinesses.length === 0) {
    list.innerHTML = `<div class="no-results">No businesses found</div>`;
    return;
  }

  const typeEmoji = { restaurant: '🍽', cafe: '☕', gym: '💪', salon: '💇', bar: '🍺',
    bakery: '🥐', pharmacy: '💊', store: '🛍', car: '🚗', 'food and drink': '🍴' };

  list.innerHTML = filteredBusinesses.map((b, i) => {
    const typeKey = Object.keys(typeEmoji).find(k => (b.primaryType || b.types?.[0] || '').toLowerCase().includes(k));
    const emoji = typeEmoji[typeKey] || '📍';
    const stars = '★'.repeat(Math.round(b.rating || 0)) + '☆'.repeat(5 - Math.round(b.rating || 0));

    if (b.heroPhotoThumb) {
      return `<div class="biz-item" onclick="selectBiz(${i})" data-index="${i}">
        <img class="biz-thumb" src="${b.heroPhotoThumb}" alt="" loading="lazy" onerror="this.style.display='none'">
        <div class="biz-meta">
          <div class="biz-name">${b.name}</div>
          <div class="biz-sub">${cleanType(b.primaryType || b.types?.[0] || '')} · ${b.shortAddress || ''}</div>
        </div>
        <div class="biz-rating">${b.rating?.toFixed(1) || '?'}★</div>
      </div>`;
    }

    return `<div class="biz-item" onclick="selectBiz(${i})" data-index="${i}">
      <div class="biz-thumb-placeholder">${emoji}</div>
      <div class="biz-meta">
        <div class="biz-name">${b.name}</div>
        <div class="biz-sub">${cleanType(b.primaryType || b.types?.[0] || '')} · ${b.shortAddress || ''}</div>
      </div>
      <div class="biz-rating">${b.rating?.toFixed(1) || '?'}★</div>
    </div>`;
  }).join('');
}

// ── Detail View ───────────────────────────────────────────────────────────────

function selectBiz(idx) {
  document.querySelectorAll('.biz-item').forEach(el => el.classList.remove('selected'));
  const items = document.querySelectorAll('.biz-item');
  if (items[idx]) items[idx].classList.add('selected');

  const b = filteredBusinesses[idx];
  renderDetail(b);
}

function renderDetail(b) {
  const panel = document.getElementById('detailPanel');

  // Hero photos
  const photos = b.photos || [];
  let heroHtml = '';
  if (photos.length === 0) {
    heroHtml = `<div class="detail-hero" style="display:flex;align-items:center;justify-content:center;font-size:64px;opacity:0.2;">📸</div>`;
  } else {
    const count = Math.min(photos.length, 4);
    const cls = ['', 'one', 'two', 'three', 'many'][count];
    const photoImgs = photos.slice(0, count).map((p, i) =>
      `<img class="hero-photo" src="${p.url}" alt="photo ${i+1}" loading="lazy">`
    ).join('');
    heroHtml = `<div class="detail-hero"><div class="hero-photos ${cls}">${photoImgs}</div></div>`;
  }

  // Badges
  const priceMap = { PRICE_LEVEL_INEXPENSIVE: '$', PRICE_LEVEL_MODERATE: '$$', PRICE_LEVEL_EXPENSIVE: '$$$', PRICE_LEVEL_VERY_EXPENSIVE: '$$$$' };
  const priceBadge = b.priceLevel ? `<span class="badge badge-price">${priceMap[b.priceLevel] || b.priceLevel}</span>` : '';
  const typeBadge = b.primaryType ? `<span class="badge badge-type">${cleanType(b.primaryType)}</span>` : '';

  // Action buttons
  const mapsUrl = b.googleMapsUri || `https://maps.google.com/?place_id=${b.placeId}`;
  const callUrl = b.phone ? `tel:${b.phone}` : '';

  // Hours
  let hoursHtml = '';
  const today = new Date().getDay();
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if (b.hoursDisplay?.length > 0) {
    const rows = b.hoursDisplay.map((line, i) => {
      const isToday = line.toLowerCase().startsWith(dayNames[today].toLowerCase());
      return `<div class="hours-row ${isToday ? 'hours-today' : ''}">
        <span class="hours-day">${line.split(':')[0]}:</span>
        <span class="hours-time">${line.split(':').slice(1).join(':').trim()}</span>
      </div>`;
    }).join('');
    hoursHtml = `<div class="hours-list">${rows}</div>`;
  } else {
    hoursHtml = `<div style="color:var(--text3);font-size:13px;font-style:italic;">Hours not available</div>`;
  }

  // Reviews
  const reviews = b.reviews || [];
  const reviewsHtml = reviews.length > 0
    ? `<div class="reviews-list">` + reviews.slice(0, 5).map(r => `
        <div class="review-card">
          <div class="review-header">
            ${r.authorPhoto ? `<img class="review-avatar" src="${r.authorPhoto}" alt="">` : ''}
            <div>
              <div class="review-author">${r.author}</div>
              <div class="review-time">${r.relativeTime}</div>
            </div>
            <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
          </div>
          <div class="review-text">"${r.text.slice(0, 300)}${r.text.length > 300 ? '...' : ''}"</div>
        </div>`).join('') + `</div>`
    : `<div style="color:var(--text3);font-size:13px;font-style:italic;">No reviews available</div>`;

  // Photos grid
  const photosGridHtml = photos.length > 0
    ? `<div class="photos-grid">` + photos.map(p => `
        <div class="photo-item" onclick="copyText('${p.url}', event)">
          <img src="${p.thumbUrl}" alt="" loading="lazy">
          <div class="photo-copy-url">Click to copy URL</div>
        </div>`).join('') + `</div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:6px;">Click any photo to copy direct image URL</div>`
    : `<div style="color:var(--text3);font-size:13px;font-style:italic;">No photos available</div>`;

  // Amenities
  const amenities = b.amenities || {};
  const amenityList = [
    { key: 'dineIn', label: 'Dine In', icon: '🍽' },
    { key: 'takeout', label: 'Takeout', icon: '🥡' },
    { key: 'delivery', label: 'Delivery', icon: '🛵' },
    { key: 'reservable', label: 'Reservations', icon: '📅' },
    { key: 'outdoorSeating', label: 'Outdoor Seating', icon: '🌤' },
    { key: 'liveMusic', label: 'Live Music', icon: '🎵' },
    { key: 'servesBeer', label: 'Beer', icon: '🍺' },
    { key: 'servesWine', label: 'Wine', icon: '🍷' },
    { key: 'servesBreakfast', label: 'Breakfast', icon: '🍳' },
    { key: 'servesLunch', label: 'Lunch', icon: '🥗' },
    { key: 'servesDinner', label: 'Dinner', icon: '🌙' },
    { key: 'wheelchairAccessible', label: 'Wheelchair', icon: '♿' },
  ].filter(a => amenities[a.key] !== undefined);

  const amenitiesHtml = amenityList.length > 0
    ? `<div class="amenities-grid">` + amenityList.map(a =>
        `<div class="amenity-pill ${amenities[a.key] ? 'yes' : ''}">${a.icon} ${a.label}</div>`
      ).join('') + `</div>`
    : `<div style="color:var(--text3);font-size:13px;font-style:italic;">No amenity data available</div>`;

  // Social links
  const social = b.social || {};
  const socialHtml = `<div class="social-grid">
    <a class="social-link" href="${social.googleMapsUri || '#'}" target="_blank">
      <span class="social-icon">🗺</span> Google Maps
    </a>
    <a class="social-link" href="${social.yelpSearch || '#'}" target="_blank">
      <span class="social-icon">⭐</span> Search Yelp
    </a>
    <a class="social-link" href="${social.instagramGuess || '#'}" target="_blank">
      <span class="social-icon">📸</span> Instagram (guess)
    </a>
    <a class="social-link" href="${social.facebookGuess || '#'}" target="_blank">
      <span class="social-icon">👥</span> Facebook (guess)
    </a>
  </div>
  <div style="font-size:11px;color:var(--text3);margin-top:8px;font-family:var(--mono);">
    ⚠ Instagram/Facebook links are name-based guesses — verify before use
  </div>`;

  // Summary
  const summary = b.generativeSummary || b.editorialSummary;
  const summaryHtml = summary
    ? `<div class="summary-box">${summary}</div>`
    : '';

  panel.innerHTML = `
    <div class="detail-inner">
      ${heroHtml}

      <div class="detail-name">${b.name}</div>
      
      <div class="badge-row">
        ${typeBadge}
        <span class="badge badge-rating">★ ${b.rating?.toFixed(1) || '?'}</span>
        <span class="badge badge-reviews">${b.reviewCount?.toLocaleString() || '?'} reviews</span>
        ${priceBadge}
        <span class="place-id-chip">
          ${b.placeId}
          <button class="copy-btn" onclick="copyText('${b.placeId}', event)">copy</button>
        </span>
      </div>

      ${summaryHtml}

      <div class="actions-bar">
        <a class="action-btn action-primary" href="${mapsUrl}" target="_blank">🗺 Open in Maps</a>
        ${b.phone ? `<a class="action-btn action-secondary" href="${callUrl}">📞 ${b.phone}</a>` : ''}
        <button class="action-btn action-secondary" onclick="copyJSON(${JSON.stringify(JSON.stringify(b)).slice(1,-1)})">📋 Copy JSON</button>
        <button class="action-btn action-secondary" onclick="generateWebsite(this)">⚡ Generate Website</button>
      </div>

      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-label">Address</div>
          <div class="info-card-value">
            <a href="${mapsUrl}" target="_blank">${b.address}</a>
          </div>
        </div>
        <div class="info-card">
          <div class="info-card-label">Phone</div>
          <div class="info-card-value">
            ${b.phone ? `<a href="tel:${b.phone}">${b.phone}</a>` : '<span style="color:var(--text3)">Not available</span>'}
            ${b.phone ? `<button class="copy-btn" onclick="copyText('${b.phone}', event)">copy</button>` : ''}
          </div>
        </div>
        <div class="info-card">
          <div class="info-card-label">Business Type</div>
          <div class="info-card-value">${(b.types || []).slice(0, 4).map(t => cleanType(t)).join(', ') || 'Unknown'}</div>
        </div>
        <div class="info-card">
          <div class="info-card-label">Coordinates</div>
          <div class="info-card-value" style="font-family:var(--mono);font-size:12px;">
            ${b.latitude?.toFixed(6)}, ${b.longitude?.toFixed(6)}
            <button class="copy-btn" onclick="copyText('${b.latitude},${b.longitude}', event)">copy</button>
          </div>
        </div>
      </div>

      <div class="section-title">🕐 Hours</div>
      ${hoursHtml}

      <div class="section-title">📸 Photos (${photos.length})</div>
      ${photosGridHtml}

      <div class="section-title">💬 Reviews</div>
      ${reviewsHtml}

      <div class="section-title">✅ Amenities</div>
      ${amenitiesHtml}

      <div class="section-title">🔗 Links & Social</div>
      ${socialHtml}

      <div class="section-title">📊 Raw Data</div>
      <button class="action-btn action-secondary" onclick="toggleJSON(this)" style="margin-bottom:8px;">Show JSON</button>
      <div id="jsonBox" style="display:none;">
        <div class="json-box">${escHtml(JSON.stringify(b, null, 2))}</div>
      </div>
    </div>`;
}

// ── Utilities ────────────────────────────────────────────────────────────────

function copyText(text, event) {
  navigator.clipboard.writeText(text).then(() => {
    if (event) {
      const btn = event.target;
      if (btn.classList.contains('copy-btn')) {
        const orig = btn.textContent;
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
      }
    }
  });
}

function copyJSON(data) {
  navigator.clipboard.writeText(data);
}

function toggleJSON(btn) {
  const box = document.getElementById('jsonBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  btn.textContent = box.style.display === 'none' ? 'Show JSON' : 'Hide JSON';
}

function cleanType(type) {
  return (type || 'other').replace(/_/g, ' ').replace(/\bestab[a-z]*\b/g, '').trim().toLowerCase();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function generateWebsite(btn) {
  btn.textContent = '⏳ Coming soon...';
  setTimeout(() => btn.textContent = '⚡ Generate Website', 2000);
  alert('Run the website-generator.js script with this business\'s placeId:\n\nnode website-generator.js --id ' + 
    (filteredBusinesses[0]?.placeId || 'PLACE_ID') + ' --api-key YOUR_KEY');
}

function exportAll() {
  const blob = new Blob([JSON.stringify({ businesses: allBusinesses }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'enriched_places.json';
  a.click();
}
</script>
</body>
</html>
